server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"                                    always;
    add_header X-Frame-Options           "DENY"                                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"    always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.tailwindcss.com unpkg.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
        always;

    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files: served internally only — Django handles auth via X-Accel-Redirect
    location /internal-media/ {
        internal;
        alias /media/;
        expires 7d;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
