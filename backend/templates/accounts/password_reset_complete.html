{% extends "base.html" %}
{% block title %}Password Updated — Canopy Tickets{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
  <div class="max-w-md w-full text-center">
    <div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Password updated</h1>
    <p class="text-gray-500 mb-6">Your password has been changed. You can now sign in with your new password.</p>
    <a href="{% url 'accounts:login' %}"
       class="inline-block px-6 py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700">
      Sign In
    </a>
  </div>
</div>
{% endblock %}
