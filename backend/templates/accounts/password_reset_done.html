{% extends "base.html" %}
{% block title %}Check Your Email — Canopy Tickets{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
  <div class="max-w-md w-full text-center">
    <div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
      <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Check your email</h1>
    <p class="text-gray-500 mb-6">
      If an account exists for that address, we've sent a password reset link. It expires in 24 hours.
    </p>
    <a href="{% url 'accounts:login' %}" class="text-sm text-blue-600 hover:underline">Back to sign in</a>
  </div>
</div>
{% endblock %}
