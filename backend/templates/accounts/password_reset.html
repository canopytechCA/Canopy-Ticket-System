{% extends "base.html" %}
{% block title %}Reset Password — Canopy Tickets{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4">
  <div class="max-w-md w-full">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Reset your password</h1>
      <p class="text-sm text-gray-500 mt-1">Enter your email and we'll send you a reset link</p>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
          <input type="email" name="email" required autofocus
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                 placeholder="you@example.com">
        </div>
        {% if form.errors %}
        <p class="text-sm text-red-600 mb-4">{{ form.email.errors|join:", " }}</p>
        {% endif %}
        <button type="submit" class="w-full py-2.5 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700">
          Send Reset Link
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-gray-500 mt-6">
      <a href="{% url 'accounts:login' %}" class="text-blue-600 hover:underline">&larr; Back to sign in</a>
    </p>
  </div>
</div>
{% endblock %}
