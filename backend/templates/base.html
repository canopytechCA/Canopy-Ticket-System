<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Canopy Tickets{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    [x-cloak] { display: none !important; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

{% if messages %}
<div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2">
  {% for message in messages %}
  <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 4000)"
       x-transition:leave="transition ease-in duration-300"
       x-transition:leave-start="opacity-100 translate-x-0"
       x-transition:leave-end="opacity-0 translate-x-4"
       class="flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-sm font-medium
         {% if message.tags == 'error' %}bg-red-600 text-white
         {% elif message.tags == 'success' %}bg-green-600 text-white
         {% else %}bg-gray-800 text-white{% endif %}">
    {{ message }}
    <button @click="show = false" class="ml-2 opacity-75 hover:opacity-100">&times;</button>
  </div>
  {% endfor %}
</div>
{% endif %}

{% block body %}{% endblock %}

</body>
</html>
